<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Chris Angell | GTM & Business Builder</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231e3a8a'/%3E%3Ctext x='16' y='22' font-family='Arial,sans-serif' font-size='14' font-weight='bold' fill='white' text-anchor='middle'%3ECA%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }

    .hero-left {
      background: #111;
      color: white;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero-left::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 80%;
      height: 200%;
      background: linear-gradient(135deg, #2563eb 0%, transparent 60%);
      opacity: 0.15;
      transform: rotate(-12deg);
    }
    .hero-portrait {
      position: absolute;
      right: -20px;
      top: -20px;
      width: 65%;
      max-width: 380px;
      opacity: 0.2;
      pointer-events: none;
      user-select: none;
      mask-image: linear-gradient(to bottom, black 40%, rgba(0,0,0,0.4) 70%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 40%, rgba(0,0,0,0.4) 70%, transparent 100%);
    }

    .voice-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    .hero-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 24px;
    }

    .hero-title {
      font-size: clamp(48px, 7vw, 80px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 32px;
    }

    .hero-title span {
      display: block;
    }

    .hero-title .highlight {
      color: #60a5fa;
    }

    .hero-title .subtitle {
      font-size: 0.35em;
      font-weight: 500;
      color: #6b7280;
      letter-spacing: 0;
      margin-top: 8px;
    }

    .hero-bio {
      font-size: 18px;
      color: #a1a1aa;
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 48px;
    }

    .hero-cta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 32px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: white;
      border: 1px solid #404040;
    }

    .btn-outline:hover {
      border-color: white;
    }

    .hero-right {
      background: #fafafa;
      padding: 48px 40px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
    }

    /* Chat Interface */
    .chat-wrapper {
      width: 100%;
      max-width: 520px;
    }

    .chat-header {
      margin-bottom: 16px;
    }

    .chat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2563eb;
      margin-bottom: 12px;
    }

    .chat-title {
      font-size: 28px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.02em;
    }

    .disclaimer {
      font-size: 12px;
      font-style: italic;
      color: #9ca3af;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .chat-container {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
    }

    .chat-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .reset-button {
      background: transparent;
      border: none;
      color: #6b7280;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .reset-button:hover {
      color: #2563eb;
    }

    .show-topics-btn {
      background: transparent;
      border: none;
      color: #2563eb;
      padding: 8px 0;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
    }

    .show-topics-btn:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }

    .hide-topics-btn {
      background: transparent;
      border: none;
      color: #9ca3af;
      padding: 8px 0;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
      text-align: center;
      transition: color 0.2s;
    }

    .hide-topics-btn:hover {
      color: #6b7280;
    }

    /* Topic Cards */
    .topics-intro {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .topics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .topic-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .topic-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: #2563eb;
      transform: scaleY(0);
      transition: transform 0.25s ease;
    }

    .topic-card:hover {
      background: white;
      border-color: #d1d5db;
      transform: translateX(4px);
    }

    .topic-card:hover::before {
      transform: scaleY(1);
    }

    .topic-card.expanded {
      grid-column: span 2;
      background: white;
    }

    .topic-card.expanded::before {
      transform: scaleY(1);
    }

    .topic-icon {
      font-size: 16px;
      margin-bottom: 6px;
    }

    .topic-icon.stars {
      color: #f59e0b;
      letter-spacing: -2px;
    }

    .topic-title {
      font-size: 12px;
      font-weight: 700;
      color: #111;
      margin-bottom: 2px;
    }

    .topic-desc {
      font-size: 10px;
      color: #6b7280;
    }

    .questions-list {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }

    .questions-list.active {
      display: block;
    }

    .question-item {
      padding: 8px 12px;
      margin: 4px 0;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
      transition: all 0.2s;
    }

    .question-item:hover {
      background: #eff6ff;
      border-color: #2563eb;
      color: #1d4ed8;
    }

    /* Messages */
    .messages {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 8px;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 2px;
    }

    .message {
      margin-bottom: 20px;
    }

    .message-label {
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .message.user .message-label {
      color: #6b7280;
    }

    .message.assistant .message-label {
      color: #2563eb;
    }

    .message-content {
      padding: 16px;
      border-radius: 12px;
      line-height: 1.7;
      font-size: 14px;
    }

    .message.user .message-content {
      background: #f4f4f5;
      color: #374151;
    }

    .message.assistant .message-content {
      background: linear-gradient(135deg, #eff6ff 0%, #f0f9ff 100%);
      color: #1e40af;
      border: 1px solid #dbeafe;
    }

    .message.assistant .message-content p { margin-bottom: 10px; }
    .message.assistant .message-content p:last-child { margin-bottom: 0; }
    .message.assistant .message-content strong { font-weight: 700; }
    .message.assistant .message-content ul, .message.assistant .message-content ol { margin: 8px 0 8px 20px; }
    .message.assistant .message-content li { margin-bottom: 4px; }
    .message.assistant .message-content a { color: #2563eb; text-decoration: underline; }

    .follow-up-suggestions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .follow-up-btn {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 20px;
      padding: 6px 14px; font-size: 12px; color: #1d4ed8; cursor: pointer;
      transition: all 0.2s; font-family: inherit; font-weight: 500;
    }
    .follow-up-btn:hover { background: #dbeafe; border-color: #93c5fd; }

    /* Input & Voice */
    .input-container {
      display: flex;
      gap: 10px;
    }

    .input-wrapper {
      flex: 1;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    input::placeholder {
      color: #9ca3af;
    }

    .send-btn {
      padding: 12px 20px;
      background: #111;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .send-btn:hover:not(:disabled) {
      background: #2563eb;
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Interaction Sections */
    .interaction-section {
      margin-bottom: 16px;
    }

    .interaction-section:last-of-type {
      margin-bottom: 0;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #2563eb;
      font-weight: 800;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .section-label .section-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      font-size: 10px;
      font-weight: 800;
      color: #2563eb;
      flex-shrink: 0;
    }

    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .section-divider span {
      font-size: 11px;
      font-weight: 500;
      color: #9ca3af;
      text-transform: lowercase;
    }

    /* Loading */
    .loading {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #2563eb;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Talk Button */
    .talk-btn {
      display: none !important;
      padding: 12px 20px;
      background: linear-gradient(135deg, #111 0%, #1a1a2e 100%);
      color: white;
      border: 2px solid #2563eb;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .talk-btn:hover {
      background: #2563eb;
      border-color: #2563eb;
      transform: translateY(-1px);
    }

    .talk-btn.active {
      background: #dc2626;
      border-color: #dc2626;
      animation: pulse-mic 1.5s ease-in-out infinite;
    }

    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(220, 38, 38, 0); }
    }



    /* Voice CTA Banner */
    .voice-cta {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      border: none;
      width: 100%;
      color: white;
      text-align: left;
      font-family: inherit;
    }

    .voice-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
    }

    .voice-cta.listening {
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      animation: pulse-mic 1.5s ease-in-out infinite;
    }

    .voice-cta-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .voice-cta-text {
      flex: 1;
    }

    .voice-cta-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .voice-cta-sub {
      font-size: 12px;
      opacity: 0.8;
      font-weight: 400;
    }

    .voice-active-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 16px;
    }

    .voice-active-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .voice-dot {
      width: 5px;
      height: 14px;
      background: white;
      border-radius: 3px;
      animation: voice-bounce 1.1s ease-in-out infinite;
    }

    .voice-dot:nth-child(2) { animation-delay: 0.2s; }
    .voice-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes voice-bounce {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    .voice-active-text {
      flex: 1;
      color: white;
    }

    .voice-active-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .voice-active-sub {
      font-size: 11px;
      opacity: 0.8;
    }

    .end-voice-btn {
      padding: 8px 18px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .end-voice-btn:hover {
      background: rgba(255,255,255,0.3);
      border-color: white;
    }

    /* Tech Stack Section */
    .tech-section {
      background: #fafafa;
      padding: 40px 60px;
      border-top: 1px solid #e5e7eb;
    }

    .tech-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .tech-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .tech-title {
      font-size: 18px;
      font-weight: 700;
      color: #374151;
      letter-spacing: -0.01em;
    }

    .tech-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      max-width: 1100px;
      margin: 0 auto;
    }
            .tech-item {
              position: relative;
            }
            .tech-item .tooltip {
              visibility: hidden;
              opacity: 0;
              position: absolute;
              bottom: 100%;
              left: 50%;
              transform: translateX(-50%);
              background: #1a1a2e;
              color: #fff;
              padding: 8px 14px;
              border-radius: 8px;
              font-size: 12px;
              font-style: italic;
              white-space: nowrap;
              pointer-events: none;
              transition: opacity 0.2s ease, visibility 0.2s ease;
              z-index: 10;
              margin-bottom: 8px;
              max-width: 280px;
              white-space: normal;
              text-align: center;
              line-height: 1.4;
            }
            .tech-item .tooltip::after {
              content: '';
              position: absolute;
              top: 100%;
              left: 50%;
              transform: translateX(-50%);
              border: 6px solid transparent;
              border-top-color: #1a1a2e;
            }
            .tech-item:hover .tooltip {
              visibility: visible;
              opacity: 1;
            }

    .tech-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .tech-item:hover {
      border-color: #d1d5db;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .tech-icon {
      width: 18px;
      height: 18px;
      filter: grayscale(100%);
      opacity: 0.6;
      transition: all 0.2s;
    }

    .tech-item:hover .tech-icon {
      filter: grayscale(0%);
      opacity: 1;
    }

    .tech-name {
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
    }

    @media (max-width: 768px) {
      .tech-section {
        padding: 32px 24px;
      }

      .tech-grid {
        gap: 6px;
      }

      .tech-item {
        padding: 6px 10px;
      }

      .tech-name {
        font-size: 11px;
      }
    }

    /* CTA Section */
    .cta-section {
      background: #111;
      padding: 120px 60px;
      position: relative;
      overflow: hidden;
    }

    .cta-section::before {
      content: '';
      position: absolute;
      bottom: -50%;
      left: -20%;
      width: 60%;
      height: 200%;
      background: linear-gradient(135deg, #2563eb 0%, transparent 50%);
      opacity: 0.1;
      transform: rotate(12deg);
    }

    .cta-content {
      max-width: 800px;
      position: relative;
      z-index: 1;
    }

    .cta-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 20px;
    }

    .cta-title {
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 900;
      color: white;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }

    .cta-text {
      font-size: 18px;
      color: #a1a1aa;
      margin-bottom: 40px;
      max-width: 500px;
    }

    .cta-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Footer */
    .footer {
      background: #111;
      border-top: 1px solid #222;
      padding: 40px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .footer-left {
      color: #6b7280;
      font-size: 14px;
    }

    .footer-left a {
      color: #60a5fa;
      text-decoration: none;
    }

    .footer-left a:hover {
      text-decoration: underline;
    }

    .footer-right {
      display: flex;
      gap: 24px;
    }

    .footer-link {
      color: #6b7280;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }
